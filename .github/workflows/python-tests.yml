name: Python Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest Pillow numpy requests

      - name: Compile Python files
        run: python -m py_compile $(find scripts tests -name '*.py' -print)

      - name: Run tests
        run: pytest -q
